# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.gotenberg_endpoint: '%env(GOTENBERG_ENDPOINT)%'
    # Adresse expéditeur unique pour tous les emails sortants (vérification, invitations…).
    app.mail_from: '%env(MAILER_FROM)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $mailFrom: '%app.mail_from%'
            # Référence Twig du logo (namespace « images »), embarqué en inline (CID) dans
            # les e-mails via email.image(). Le « @@ » échappe le « @ » littéral en YAML
            # de services (sinon interprété comme une référence de service).
            string $logoPath: '@@images/entreprises/logofav.png'
            # Secret de vérification des signatures de webhook de paiement. Repli sur
            # APP_SECRET tant qu'aucun PSP réel (avec sa propre clé) n'est branché.
            string $paymentWebhookSecret: '%env(APP_SECRET)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Correction pour l'injection du menu dans EspaceDeTravailComponentController
    App\Controller\EspaceDeTravailComponentController:
        arguments:
            $menuData: '%app.menu_data%'

    # ... (votre configuration existante)

    # Taggage automatique pour les fournisseurs de canevas
    _instanceof:
        # Pour les canevas de LISTE
        App\Services\Canvas\Provider\List\ListCanvasProviderInterface:
            tags: ['app.list_canvas_provider']

        # Pour les canevas de ENTITY
        App\Services\Canvas\Provider\Entity\EntityCanvasProviderInterface:
            tags: ['app.entity_canvas_provider']

        # Pour les canevas de FORM (Correction du namespace de l'interface)
        App\Services\Canvas\Provider\Form\FormCanvasProviderInterface:
            tags: ['app.form_canvas_provider']

        # NOUVEAU : Pour les canevas NUMERIC
        App\Services\Canvas\Provider\Numeric\NumericCanvasProviderInterface:
            tags: ['app.numeric_canvas_provider']

        # NOUVEAU : Pour les stratégies de calcul d'indicateurs
        App\Services\Canvas\Indicator\IndicatorCalculationStrategyInterface:
            tags: ['app.indicator_calculation_strategy']

        # Outils de données de l'assistant IA (consommés par le moteur via
        # AutowireIterator, exposables en tool-calling au futur LLM réel).
        App\Ai\Tool\AiToolInterface:
            tags: ['app.ai_tool']

    # Moteur de l'assistant IA : implémentation par défaut = simulateur
    # déterministe (repli/tests). Le jour où le LLM réel est choisi (bridge
    # Symfony AI / Anthropic…), on ajoute son adaptateur et on repointe cet
    # alias dessus — aucun autre changement applicatif (même pattern que le
    # PSP de paiement ci-dessous).
    App\Ai\Engine\AiEngineInterface: '@App\Ai\Engine\SimulatedAiEngine'

    # PSP de paiement : implémentation par défaut = simulateur (repli/tests). Le
    # jour où un PSP réel est choisi, on ajoute son adaptateur et on repointe cet
    # alias dessus — aucun autre changement applicatif.
    App\Payment\Gateway\PaymentGatewayInterface: '@App\Payment\Gateway\SimulatedGateway'

    # NOUVEAU : Décorateur pour le PropertyAccessor du Sérialiseur.
    # Cela permet d'intercepter les exceptions Doctrine (EntityNotFoundException)
    # lors de la sérialisation de relations rompues, sans faire planter l'application.
    App\Serializer\SafePropertyAccessor:
        # On décore le service principal 'property_accessor' pour que la correction
        # s'applique à la fois au Sérialiseur ET au composant Formulaire.
        decorates: 'property_accessor'
        arguments: ['@App\Serializer\SafePropertyAccessor.inner']
        public: false
